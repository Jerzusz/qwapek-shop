services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_PATH: /app/data
    volumes:
      - qwapek_data:/app/data
      - qwapek_uploads:/app/uploads
    expose:
      - "5000"

  web:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${WEB_PORT:-8081}:80"

volumes:
  qwapek_data:
  qwapek_uploads:
